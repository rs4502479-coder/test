<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RDP Web Controller</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    #screen {
      border: 2px solid #333;
      border-radius: 6px;
      cursor: crosshair;
      background: #000;
      max-width: 100%;
      height: auto;
    }
    .status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Remote Desktop Controller</h1>
  <canvas id="screen" width="800" height="600"></canvas>
  <div class="status" id="status">Connecting...</div>

  <script>
    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");

    // Render पर HTTPS के साथ Secure WebSockets (wss://) स्वचालित रूप से सेट हो जाएगा
    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = `${protocol}//${window.location.host}`;
    const ws = new WebSocket(wsUrl);

    ws.binaryType = "arraybuffer";

    ws.onopen = () => {
      ws.send("controller");
      statusText.textContent = "Connected to Server (Waiting for Host...)";
    };

    ws.onclose = () => {
      statusText.textContent = "Disconnected from Server";
    };

    ws.onmessage = (event) => {
      if (typeof event.data === "string") return;

      const blob = new Blob([event.data], { type: "image/jpeg" });
      const url = URL.createObjectURL(blob);
      const img = new Image();

      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        statusText.textContent = "Receiving stream...";
      };

      img.src = url;
    };

    // Click event handler
    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = Math.round((e.clientX - rect.left) * (canvas.width / rect.width));
      const y = Math.round((e.clientY - rect.top) * (canvas.height / rect.height));

      if (ws.readyState === WebSocket.OPEN) {
        ws.send(`CLICK:${x},${y}`);
      }
    });
  </script>
</body>
</html>
